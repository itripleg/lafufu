[project]
name = "lafufu-printer"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = ["lafufu-shared"]

[tool.uv.sources]
lafufu-shared = { workspace = true }

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lafufu_printer"]
