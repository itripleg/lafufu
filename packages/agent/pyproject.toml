[project]
name = "lafufu-agent"
version = "0.1.0"
requires-python = ">=3.13"
# openwakeword is pinned to a post-migration git commit because no PyPI release
# since v0.6.0 (Feb 2024) supports Python 3.13 — v0.6.0 depends on the dead
# tflite-runtime. Upstream main switched to ai-edge-litert on 2025-10-18
# (PR #289 / commit af923e1d), which has 3.13 wheels for Linux aarch64 (Pi),
# Linux x64, macOS, and Windows. Repin to a real release once one is cut.
dependencies = [
    "lafufu-shared",
    "pyaudio>=0.2.14",
    "openai-whisper>=20231117",
    "faster-whisper>=1.0",
    "httpx>=0.27",
    "piper-tts>=1.2",
    "audioop-lts>=0.2.2",
    "openwakeword @ git+https://github.com/dscripka/openWakeWord.git@af923e1d",
]

[tool.uv.sources]
lafufu-shared = { workspace = true }

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lafufu_agent"]

# Required because openwakeword is pinned to a git URL (no PyPI release with
# ai-edge-litert support exists yet — see the comment above `dependencies`).
[tool.hatch.metadata]
allow-direct-references = true
