[project]
name = "lafufu-agent"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "lafufu-shared",
    "pyaudio>=0.2.14",
    "openai-whisper>=20231117",
    "httpx>=0.27",
    "piper-tts>=1.2",
    "audioop-lts>=0.2.2",
]

[tool.uv.sources]
lafufu-shared = { workspace = true }

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lafufu_agent"]
