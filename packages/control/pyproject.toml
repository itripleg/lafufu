[project]
name = "lafufu-control"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
    "lafufu-shared",
    "fastapi>=0.111",
    "uvicorn[standard]>=0.30",
    "sqlmodel>=0.0.16",
    "httpx>=0.27",
    "python-multipart>=0.0.9",
    "pillow>=10.0",
]

[tool.uv.sources]
lafufu-shared = { workspace = true }

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/lafufu_control"]
