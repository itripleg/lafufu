# Bound to loopback: only processes on this Pi can reach the bus or the
# monitoring endpoint. The web UI reaches NATS via the control /ws bridge,
# not directly, so this breaks nothing on a single-Pi deployment.
# Going multi-host later means widening `host` AND adding auth + TLS.
host: "127.0.0.1"
port: 4222
http: "127.0.0.1:8222"

jetstream {
  store_dir: "/var/lafufu/jetstream"
  max_memory_store: 128MB
  max_file_store: 1GB
}

# Phase 0: loopback-only, no auth
